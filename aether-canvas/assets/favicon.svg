<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="circuit" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="50%" stop-color="#00e8c0"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- iOS-style rounded rect background -->
  <rect width="32" height="32" rx="7" ry="7" fill="#141e2a"/>
  <!-- Circuit-B letterform -->
  <g filter="url(#glow)">
    <path d="M10 6h7a5 5 0 0 1 0 10h-7v-10z M10 16h8a5 5 0 0 1 0 10h-8v-10z"
          fill="none" stroke="url(#circuit)" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Circuit traces -->
    <line x1="10" y1="8" x2="7" y2="8" stroke="url(#circuit)" stroke-width="0.8"/>
    <line x1="10" y1="12" x2="6" y2="12" stroke="url(#circuit)" stroke-width="0.8"/>
    <line x1="10" y1="20" x2="7" y2="20" stroke="url(#circuit)" stroke-width="0.8"/>
    <line x1="10" y1="24" x2="6" y2="24" stroke="url(#circuit)" stroke-width="0.8"/>
    <!-- Circuit dots -->
    <circle cx="6" cy="8" r="1" fill="#00ffaa"/>
    <circle cx="5" cy="12" r="1" fill="#00e8c0"/>
    <circle cx="6" cy="20" r="1" fill="#00ffaa"/>
    <circle cx="5" cy="24" r="1" fill="#00e8c0"/>
    <!-- Glow point -->
    <circle cx="22" cy="11" r="1.2" fill="#fff" opacity="0.7"/>
  </g>
</svg>
